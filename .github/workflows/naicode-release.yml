# naicode release workflow
# Trigger: push a tag matching rust-v26.*.*
# Example:
#   git tag rust-v26.7.11 && git push origin rust-v26.7.11

name: naicode-release

on:
  push:
    tags:
      - "rust-v26.*.*"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  # ── 1. validate tag == Cargo.toml version ──────────────────────────────────
  tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate tag matches Cargo.toml
        shell: bash
        run: |
          set -euo pipefail
          tag_ver="${GITHUB_REF_NAME#rust-v}"
          cargo_ver="$(grep -m1 '^version' codex-rs/Cargo.toml \
                        | sed -E 's/version *= *"([^"]+)".*/\1/')"
          [[ "${tag_ver}" == "${cargo_ver}" ]] \
            || { echo "Tag ${tag_ver} != Cargo.toml ${cargo_ver}"; exit 1; }
          echo "OK: ${tag_ver}"

  # ── 2. cross-compile Linux (x64 + arm64, musl) ────────────────────────────
  build-linux-x64:
    needs: tag-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl tools and configure linker
        working-directory: codex-rs
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q musl-tools
          rustup target add x86_64-unknown-linux-musl
          mkdir -p ~/.cargo
          printf '[target.x86_64-unknown-linux-musl]\nlinker = "musl-gcc"\n' >> ~/.cargo/config.toml
      - name: Build
        working-directory: codex-rs
        run: |
          cargo build -p codex-cli -p codex-code-mode-host \
            --release --target x86_64-unknown-linux-musl
      - name: Package
        working-directory: codex-rs
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          mkdir -p dist/codex-package
          cp target/x86_64-unknown-linux-musl/release/codex dist/codex-package/
          cp target/x86_64-unknown-linux-musl/release/codex-code-mode-host dist/codex-package/
          tar -czf "dist/codex-package-${ver}-x86_64-unknown-linux-musl.tar.gz" \
            -C dist/codex-package .
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-unknown-linux-musl
          path: codex-rs/dist/

  build-linux-arm64:
    needs: tag-check
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Install musl tools and configure linker
        working-directory: codex-rs
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q musl-tools
          rustup target add aarch64-unknown-linux-musl
          mkdir -p ~/.cargo
          printf '[target.aarch64-unknown-linux-musl]\nlinker = "musl-gcc"\n' >> ~/.cargo/config.toml
      - name: Build
        working-directory: codex-rs
        run: |
          cargo build -p codex-cli -p codex-code-mode-host \
            --release --target aarch64-unknown-linux-musl
      - name: Package
        working-directory: codex-rs
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          mkdir -p dist/codex-package
          cp target/aarch64-unknown-linux-musl/release/codex dist/codex-package/
          cp target/aarch64-unknown-linux-musl/release/codex-code-mode-host dist/codex-package/
          tar -czf "dist/codex-package-${ver}-aarch64-unknown-linux-musl.tar.gz" \
            -C dist/codex-package .
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-unknown-linux-musl
          path: codex-rs/dist/

  # ── 3. macOS (arm64 + x64) ─────────────────────────────────────────────────
  build-macos-arm64:
    needs: tag-check
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build
        working-directory: codex-rs
        run: |
          cargo build -p codex-cli -p codex-code-mode-host \
            --release --target aarch64-apple-darwin
      - name: Package
        working-directory: codex-rs
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          mkdir -p dist/codex-package
          cp target/aarch64-apple-darwin/release/codex dist/codex-package/
          cp target/aarch64-apple-darwin/release/codex-code-mode-host dist/codex-package/
          tar -czf "dist/codex-package-${ver}-aarch64-apple-darwin.tar.gz" \
            -C dist/codex-package .
      - uses: actions/upload-artifact@v4
        with:
          name: aarch64-apple-darwin
          path: codex-rs/dist/

  build-macos-x64:
    needs: tag-check
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - name: Build
        working-directory: codex-rs
        run: |
          cargo build -p codex-cli -p codex-code-mode-host \
            --release --target x86_64-apple-darwin
      - name: Package
        working-directory: codex-rs
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          mkdir -p dist/codex-package
          cp target/x86_64-apple-darwin/release/codex dist/codex-package/
          cp target/x86_64-apple-darwin/release/codex-code-mode-host dist/codex-package/
          tar -czf "dist/codex-package-${ver}-x86_64-apple-darwin.tar.gz" \
            -C dist/codex-package .
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-apple-darwin
          path: codex-rs/dist/

  # ── 4. Windows (x64) ───────────────────────────────────────────────────────
  build-windows-x64:
    needs: tag-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Build
        working-directory: codex-rs
        run: |
          cargo build -p codex-cli -p codex-code-mode-host `
            --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: bash
        working-directory: codex-rs
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          mkdir -p dist/codex-package
          cp target/x86_64-pc-windows-msvc/release/codex.exe dist/codex-package/
          cp target/x86_64-pc-windows-msvc/release/codex-code-mode-host.exe dist/codex-package/
          tar -czf "dist/codex-package-${ver}-x86_64-pc-windows-msvc.tar.gz" \
            -C dist/codex-package .
      - uses: actions/upload-artifact@v4
        with:
          name: x86_64-pc-windows-msvc
          path: codex-rs/dist/

  # ── 5. assemble + publish npm ──────────────────────────────────────────────
  publish-npm:
    needs:
      - build-linux-x64
      - build-linux-arm64
      - build-macos-arm64
      - build-macos-x64
      - build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{x86_64,aarch64}-*"

      - name: List artifacts
        run: ls -R dist/

      - name: Stage npm packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          ver="${VERSION#rust-v}"
          python3 scripts/stage_npm_packages.py \
            --release-version "$ver" \
            --artifacts-dir "${GITHUB_WORKSPACE}/dist" \
            --package codex

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/**

      - name: Publish to npm (token)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#rust-v}"
          for pkg_dir in npm-staging/naicode-linux-* \
                         npm-staging/naicode-darwin-* \
                         npm-staging/naicode-win32-*; do
            [[ -d "$pkg_dir" ]] || continue
            npm publish "$pkg_dir" --access public
          done
          npm publish npm-staging/naicode --access public
