name: naicode-publish-existing

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Completed NaiCode release run containing platform artifacts"
        required: true
        type: string
      release_tag:
        description: "Release tag and npm version source, for example rust-v1.2.8086"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          ref: naicode
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download existing build artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.source_run_id }}
          path: dist
          pattern: "{x86_64,aarch64}-*"

      - name: Stage npm packages
        env:
          VERSION: ${{ inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${VERSION#rust-v}"
          python3 scripts/stage_npm_packages.py \
            --release-version "$ver" \
            --artifacts-dir "${GITHUB_WORKSPACE}/dist" \
            --workflow-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${{ inputs.source_run_id }}" \
            --package codex

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || {
            mapfile -t release_files < <(find dist -type f -not -path 'dist/npm/*')
            gh release create "$RELEASE_TAG" "${release_files[@]}" --generate-notes
          }

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          publish_tarball() {
            local tarball="$1"
            local identity
            identity="$(tar -xOf "$tarball" package/package.json | node -e 'let s=""; process.stdin.on("data", d => s += d).on("end", () => { const p = JSON.parse(s); process.stdout.write(`${p.name}@${p.version}`); })')"
            if npm view "$identity" version >/dev/null 2>&1; then
              echo "Already published: $identity"
            else
              npm publish "$tarball" --access public
            fi
          }
          version="${RELEASE_TAG#rust-v}"
          publish_tarball "dist/npm/codex-npm-${version}.tgz"
          for tarball in dist/npm/codex-npm-darwin-*.tgz dist/npm/codex-npm-win32-*.tgz; do
            publish_tarball "$tarball"
          done
