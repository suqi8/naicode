name: naicode-publish-existing

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Completed NaiCode release run containing platform artifacts"
        required: true
        type: string
      release_tag:
        description: "Release tag and npm version source, for example rust-v1.2.8086"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: NPM_TOKEN
    steps:
      - uses: actions/checkout@v4
        with:
          ref: naicode
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download existing build artifacts
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.source_run_id }}
          path: dist
          pattern: "{x86_64,aarch64}-*"

      - name: Stage npm packages
        env:
          VERSION: ${{ inputs.release_tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${VERSION#rust-v}"
          python3 scripts/stage_npm_packages.py \
            --release-version "$ver" \
            --artifacts-dir "${GITHUB_WORKSPACE}/dist" \
            --package codex

      - name: Create GitHub Release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" dist/** --generate-notes

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tarball in dist/npm/codex-npm-*.tgz; do
            npm publish "$tarball" --access public
          done
